name: AUR release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure Git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Extract version
        id: version
        run: |
          VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get last git tag
        id: git_tag
        run: |
          git fetch --tags
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          TAG=${TAG#v}
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Check version vs tag
        id: check_version
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if [ "${{ steps.version.outputs.version }}" != "${{ steps.git_tag.outputs.tag }}" ]; then
            echo "different=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $VERSION already exists"
            echo "different=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Git tag
        if: steps.check_version.outputs.different == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Generate release artifacts
        if: steps.check_version.outputs.different == 'true'
        run: |
          make release

      - name: Setup SSH for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        if: steps.check_version.outputs.different == 'true'
        run: |
          mkdir -p ~/.ssh

          echo "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur

          cat >> ~/.ssh/config <<EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

      - name: Publish package to AUR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        if: steps.check_version.outputs.different == 'true'
        run: |
          git clone ssh://aur@aur.archlinux.org/garmin-tracker-rs.git garmin_tracker_rs_repo

          cd garmin_tracker_rs_repo

          cp ../dist/PKGBUILD .
          cp ../dist/.SRCINFO .

          git add PKGBUILD .SRCINFO 

          if ! git diff --cached --quiet; then
            git commit -m "Release ${VERSION}-1"
            git push
          else
            echo "No changes to publish"
          fi
